version: "3.8"

services:
  backend:
    build: ./backend
    container_name: leasebot-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db    # persist vector DB across restarts
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: leasebot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # for SSL later
    depends_on:
      - backend

volumes:
  chroma_data:
